name: Auto Update README

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "*/30 * * * *"   # runs every 30 minutes (you can change this)
  workflow_dispatch: {}       # manual trigger option

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update README Automatically
        run: |
          python3 - <<'PY'
          import re, pathlib, sys
          from datetime import datetime, timezone

          repo = pathlib.Path(".")

          # Folders to check
          folders = {
              "DSA": "dsa",
              "LeetCode": "leetcodeque",
              "Java Codes": "java codes"
          }

          counts = {}
          for label, folder in folders.items():
              path = repo / folder
              count = 0
              if path.exists():
                  count = sum(1 for f in path.rglob("*.java") if f.is_file())
              counts[label] = count

          # Build replacement text
          count_lines = [f"**{label}:** {count}" for label, count in counts.items()]
          count_text = "\n".join(count_lines)

          # Add total
          total = sum(counts.values())
          count_text += f"\n\n**Total Problems:** {total}"

          # Timestamp (auto refresh)
          utc_time = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")

          readme = repo / "README.md"
          if not readme.exists():
              print("README.md not found")
              sys.exit(1)

          text = readme.read_text(encoding="utf-8")

          # Replace PROBLEM_COUNT section
          text = re.sub(
              r"<!--PROBLEM_COUNT-->.*?<!--PROBLEM_COUNT_END-->",
              f"<!--PROBLEM_COUNT-->\n{count_text}\n<!--PROBLEM_COUNT_END-->",
              text,
              flags=re.S
          )

          # Replace STATS_SECTION section
          text = re.sub(
              r"<!--STATS_SECTION-->.*?<!--STATS_SECTION_END-->",
              f"<!--STATS_SECTION-->\nLast updated: **{utc_time}**\n<!--STATS_SECTION_END-->",
              text,
              flags=re.S
          )

          readme.write_text(text, encoding="utf-8")
          print("✅ README.md updated successfully!")
          PY

      - name: Commit & Push Changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: "chore: auto-update README (problems & timestamp)"
          add: "README.md"
          push: true
